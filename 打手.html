<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙傲天俱乐部 · 打手端</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #f2f4f8; margin: 0; padding: 15px; font-family: system-ui; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h2, h3 { color: #0f172a; margin: 0 0 12px 0; border-left: 4px solid #f5c542; padding-left: 12px; }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #cbd5e1; background: white; color: #0f172a; }
        button { background: #f5c542; color: #0f172a; font-weight: bold; border: none; cursor: pointer; }
        .gray-btn { background: #e2e8f0; border: 1px solid #cbd5e1; }
        .order-item { background: #f8fafc; border-radius: 20px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #f5c542; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .announcement { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 16px; margin-bottom: 12px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
(function() {
    if (!localStorage.getItem('club_users')) localStorage.setItem('club_users', JSON.stringify([]));
    if (!localStorage.getItem('club_gamers')) localStorage.setItem('club_gamers', JSON.stringify([]));
    if (!localStorage.getItem('club_orders')) localStorage.setItem('club_orders', JSON.stringify([]));
    if (!localStorage.getItem('club_equipment')) localStorage.setItem('club_equipment', JSON.stringify([]));
    if (!localStorage.getItem('club_admin')) localStorage.setItem('club_admin', JSON.stringify({ loginId: 'admin', pwd: 'admin123' }));
    if (!localStorage.getItem('club_recharge_reqs')) localStorage.setItem('club_recharge_reqs', JSON.stringify([]));
    if (!localStorage.getItem('club_withdraw_reqs')) localStorage.setItem('club_withdraw_reqs', JSON.stringify([]));
    if (!localStorage.getItem('club_complaints')) localStorage.setItem('club_complaints', JSON.stringify([]));
    if (!localStorage.getItem('club_announcements')) localStorage.setItem('club_announcements', JSON.stringify({ user: '', gamer: '' }));

    function getGamers() { return JSON.parse(localStorage.getItem('club_gamers') || '[]'); }
    function setGamers(v) { localStorage.setItem('club_gamers', JSON.stringify(v)); }
    function getOrders() { return JSON.parse(localStorage.getItem('club_orders') || '[]'); }
    function setOrders(v) { localStorage.setItem('club_orders', JSON.stringify(v)); }
    function getWithdrawReqs() { return JSON.parse(localStorage.getItem('club_withdraw_reqs') || '[]'); }
    function setWithdrawReqs(v) { localStorage.setItem('club_withdraw_reqs', JSON.stringify(v)); }
    function getAnnouncements() { return JSON.parse(localStorage.getItem('club_announcements') || '{"user":"","gamer":""}'); }

    let currentGamer = null;
    function saveSession(gamer) {
        currentGamer = gamer;
        localStorage.setItem('club_gamer_session', JSON.stringify(gamer ? { gid: gamer.gid } : null));
        render();
    }
    function getSession() {
        let raw = localStorage.getItem('club_gamer_session');
        if (!raw) return null;
        let sess = JSON.parse(raw);
        if (!sess) return null;
        let gamers = getGamers();
        return gamers.find(g => g.gid === sess.gid) || null;
    }
    function render() {
        let container = document.getElementById('app');
        if (!container) return;
        let g = getSession();
        if (!g) {
            container.innerHTML = `
                <div class="card">
                    <h2>🔫 打手登录</h2>
                    <input type="text" id="loginId" placeholder="账号">
                    <input type="password" id="loginPwd" placeholder="密码">
                    <button id="loginBtn">登录</button>
                    <div style="margin-top:12px;">联系管理员获取打手账号</div>
                </div>
            `;
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                let id = document.getElementById('loginId').value;
                let pwd = document.getElementById('loginPwd').value;
                let gamers = getGamers();
                let gamer = gamers.find(g => g.loginId === id && g.pwd === pwd);
                if (gamer) saveSession(gamer);
                else alert("账号或密码错误");
            });
            return;
        }
        currentGamer = g;
        if (g.banned) {
            container.innerHTML = `<div class="card"><h2>⛔ 账号已封禁</h2><button id="logout">退出</button></div>`;
            document.getElementById('logout')?.addEventListener('click', () => { localStorage.removeItem('club_gamer_session'); render(); });
            return;
        }
        if (!g.approved) {
            container.innerHTML = `<div class="card"><h2>⏳ 账号审核中</h2><p>请等待管理员通过</p><button id="logout">退出</button></div>`;
            document.getElementById('logout')?.addEventListener('click', () => { localStorage.removeItem('club_gamer_session'); render(); });
            return;
        }

        let announcements = getAnnouncements();
        let myOrders = getOrders().filter(o => o.gamerId === g.gid);
        let availableOrders = getOrders().filter(o => o.status === 'waiting' && (!o.gamerId || o.gamerId === g.gid));
        let html = `
            <div class="card">
                ${announcements.gamer ? `<div class="announcement">📢 打手公告：${announcements.gamer}</div>` : ''}
                <h2>🔫 ${g.username}</h2>
                <div>💰 余额：${g.balance} 元</div>
                <div>⭐ 评分：${g.avgRating} | 单量：${g.totalOrders}</div>
                <div class="flex">
                    <button id="logoutBtn" class="gray-btn">退出</button>
                    <button id="withdrawBtn" class="gray-btn">提现申请</button>
                </div>
            </div>
            <div class="card">
                <h3>🛠️ 设置我的段位/物资技能与报价</h3>
                <div id="skillsList"></div>
                <div class="flex">
                    <select id="skillType">
                        <option value="段位">段位</option>
                        <option value="物资">物资</option>
                    </select>
                    <input id="skillTarget" placeholder="目标（王牌/热成像等）">
                    <input id="skillPrice" placeholder="价格（元）">
                </div>
                <button id="addSkill">添加技能报价</button>
            </div>
            <div class="card"><h3>📢 可接点单</h3><div id="availableOrders"></div></div>
            <div class="card"><h3>📋 我的接单</h3><div id="myOrdersList"></div></div>
        `;
        container.innerHTML = html;
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('club_gamer_session'); render(); });
        document.getElementById('withdrawBtn')?.addEventListener('click', () => {
            let amt = prompt("提现金额");
            let acc = prompt("账号");
            if (amt && acc) {
                let reqs = getWithdrawReqs();
                reqs.push({ id: Date.now(), userId: g.gid, amount: parseInt(amt), account: acc, status: 'pending', type: 'gamer' });
                setWithdrawReqs(reqs);
                alert("提现申请已提交");
            }
        });

        let skillsDiv = document.getElementById('skillsList');
        skillsDiv.innerHTML = g.skills.map((s, idx) => `<div>${s.type}·${s.target} ¥${s.price} <button class="delSkill" data-idx="${idx}">删除</button></div>`).join('');
        document.querySelectorAll('.delSkill').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.idx);
                g.skills.splice(idx, 1);
                let gamers = getGamers();
                let i = gamers.findIndex(gg => gg.gid === g.gid);
                if (i !== -1) gamers[i] = g;
                setGamers(gamers);
                render();
            });
        });
        document.getElementById('addSkill')?.addEventListener('click', () => {
            let type = document.getElementById('skillType').value;
            let target = document.getElementById('skillTarget').value;
            let price = parseInt(document.getElementById('skillPrice').value);
            if (type && target && price) {
                g.skills.push({ type, target, price });
                let gamers = getGamers();
                let i = gamers.findIndex(gg => gg.gid === g.gid);
                if (i !== -1) gamers[i] = g;
                setGamers(gamers);
                render();
            } else alert("填完整");
        });

        let availDiv = document.getElementById('availableOrders');
        availDiv.innerHTML = availableOrders.map(o => `
            <div class="order-item">
                <div>👤 ${o.userName} 出价 ¥${o.price}</div>
                <div>需求：${o.description}</div>
                <button class="acceptOrder" data-oid="${o.oid}">接单</button>
            </div>
        `).join('');
        document.querySelectorAll('.acceptOrder').forEach(btn => {
            btn.addEventListener('click', () => {
                let oid = btn.dataset.oid;
                let orders = getOrders();
                let ord = orders.find(x => x.oid === oid);
                if (ord && ord.status === 'waiting') {
                    ord.status = 'accepted';
                    ord.gamerId = g.gid;
                    ord.gamerName = g.username;
                    setOrders(orders);
                    alert("接单成功，等待玩家确认开始");
                    render();
                }
            });
        });

        let myDiv = document.getElementById('myOrdersList');
        myDiv.innerHTML = myOrders.map(o => `
            <div class="order-item">
                <div>订单：${o.description} | 金额 ¥${o.price}</div>
                <div>状态：${o.status}</div>
                ${o.status === 'in_progress' ? `<button class="finishOrder" data-oid="${o.oid}">标记完成</button>` : ''}
            </div>
        `).join('');
        document.querySelectorAll('.finishOrder').forEach(btn => {
            btn.addEventListener('click', () => {
                let oid = btn.dataset.oid;
                let orders = getOrders();
                let ord = orders.find(x => x.oid === oid);
                if (ord && ord.status === 'in_progress') {
                    ord.status = 'completed';
                    setOrders(orders);
                    alert("已标记完成，等待用户确认自动结算");
                    render();
                }
            });
        });
    }
    render();
})();
</script>
</body>
</html>
