<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>龙傲天俱乐部 · 打手端</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #f8fafc; margin: 0; padding: 15px; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #0f172a; }
        .container { max-width: 650px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 18px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        h2, h3 { margin: 0 0 12px 0; border-left: 4px solid #f59e0b; padding-left: 12px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 40px; border: 1px solid #cbd5e1; background: white; font-size: 14px; }
        button { background: #f59e0b; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.98); }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .order-item { background: #f8fafc; border-radius: 20px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #f59e0b; }
        .chat-box { max-height: 200px; overflow-y: auto; background: #f1f5f9; border-radius: 16px; padding: 10px; margin: 8px 0; font-size: 13px; }
        .chat-msg { padding: 6px 10px; margin: 4px 0; border-radius: 20px; background: white; }
        .chat-msg.gamer { background: #f59e0b; color: white; text-align: right; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 10px 20px; border-radius: 40px; font-size: 13px; z-index: 1100; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ---------- 安全初始化数据 ----------
if (!localStorage.getItem('club_users')) localStorage.setItem('club_users', JSON.stringify([]));
if (!localStorage.getItem('club_gamers')) {
    // 预设一个测试打手，确保所有字段完整
    localStorage.setItem('club_gamers', JSON.stringify([
        { gid: 'g1', username: '墨渊', loginId: 'moyuan', pwd: '123456', skills: [{ type: '段位', target: '王牌', price: 80 }], balance: 0, level: 'junior_gamer', banned: false, approved: true, verifyStatus: 'verified', realName: '墨渊', idCard: '********', totalOrders: 0, avgRating: 0 }
    ]));
}
if (!localStorage.getItem('club_orders')) localStorage.setItem('club_orders', JSON.stringify([]));
if (!localStorage.getItem('club_equipment')) localStorage.setItem('club_equipment', JSON.stringify([]));
if (!localStorage.getItem('club_admin')) localStorage.setItem('club_admin', JSON.stringify({ loginId: 'admin', pwd: 'admin123' }));
if (!localStorage.getItem('club_recharge_reqs')) localStorage.setItem('club_recharge_reqs', JSON.stringify([]));
if (!localStorage.getItem('club_withdraw_reqs')) localStorage.setItem('club_withdraw_reqs', JSON.stringify([]));
if (!localStorage.getItem('club_complaints')) localStorage.setItem('club_complaints', JSON.stringify([]));
if (!localStorage.getItem('club_announcements')) localStorage.setItem('club_announcements', JSON.stringify({ gamer: '' }));
if (!localStorage.getItem('club_settings')) localStorage.setItem('club_settings', JSON.stringify({ platformFee: 10, autoCancelHours: 24, autoConfirmHours: 72, minWithdrawGamer: 25 }));
if (!localStorage.getItem('club_logs')) localStorage.setItem('club_logs', JSON.stringify([]));

function showToast(msg) { let div = document.createElement('div'); div.className = 'toast'; div.innerText = msg; document.body.appendChild(div); setTimeout(() => div.remove(), 2000); }
function addLog(type, userId, action, detail) { let logs = JSON.parse(localStorage.getItem('club_logs') || '[]'); logs.unshift({ id: Date.now(), type, userId, action, detail, time: new Date().toLocaleString() }); if (logs.length > 500) logs.pop(); localStorage.setItem('club_logs', JSON.stringify(logs)); }
function getGamers() { let raw = localStorage.getItem('club_gamers'); try { return JSON.parse(raw) || []; } catch(e) { return []; } }
function setGamers(v) { localStorage.setItem('club_gamers', JSON.stringify(v)); }
function getOrders() { let raw = localStorage.getItem('club_orders'); try { return JSON.parse(raw) || []; } catch(e) { return []; } }
function setOrders(v) { localStorage.setItem('club_orders', JSON.stringify(v)); }
function getWithdrawReqs() { let raw = localStorage.getItem('club_withdraw_reqs'); try { return JSON.parse(raw) || []; } catch(e) { return []; } }
function setWithdrawReqs(v) { localStorage.setItem('club_withdraw_reqs', JSON.stringify(v)); }
function getAnnouncements() { let raw = localStorage.getItem('club_announcements'); try { return JSON.parse(raw) || {}; } catch(e) { return {}; } }
function getSettings() { let raw = localStorage.getItem('club_settings'); try { return JSON.parse(raw) || {}; } catch(e) { return {}; } }
function getAgeByIdCard(idCard) { if (!idCard || idCard.length !== 18) return null; let birth = idCard.substring(6,14); let year = parseInt(birth.substring(0,4)); let month = parseInt(birth.substring(4,6)); let day = parseInt(birth.substring(6,8)); let today = new Date(); let age = today.getFullYear() - year; if (today.getMonth()+1 < month || (today.getMonth()+1 === month && today.getDate() < day)) age--; return age; }
function checkIdCard(idCard) { return /^[1-9]\d{5}(18|19|20)\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\d{3}[\dX]$/i.test(idCard); }

let currentGamer = null;
function saveSession(gamer) { currentGamer = gamer; localStorage.setItem('club_gamer_session', JSON.stringify(gamer ? { gid: gamer.gid } : null)); render(); }
function getSession() { let raw = localStorage.getItem('club_gamer_session'); if (!raw) return null; try { let sess = JSON.parse(raw); if (!sess) return null; let gamers = getGamers(); return gamers.find(g => g.gid === sess.gid) || null; } catch(e) { return null; } }

function render() {
    let container = document.getElementById('app');
    if (!container) return;
    let g = getSession();
    if (!g) {
        container.innerHTML = `<div class="card"><h2>🔫 打手登录</h2><input id="loginId" placeholder="账号"><input id="loginPwd" type="password" placeholder="密码"><button id="loginBtn">登录</button><div class="flex" style="justify-content:center;margin-top:12px;"><span class="badge" style="background:#e2e8f0;">测试账号: moyuan / 123456</span></div></div>`;
        document.getElementById('loginBtn')?.addEventListener('click', () => {
            let id = document.getElementById('loginId').value, pwd = document.getElementById('loginPwd').value;
            let gamers = getGamers();
            let gamer = gamers.find(g => g.loginId === id && g.pwd === pwd);
            if (gamer) saveSession(gamer);
            else alert("账号或密码错误");
        });
        return;
    }
    currentGamer = g;
    if (g.banned) { container.innerHTML = `<div class="card"><h2>⛔ 账号已封禁</h2><button onclick="localStorage.removeItem('club_gamer_session');location.reload()">重新登录</button></div>`; return; }
    if (!g.approved) { container.innerHTML = `<div class="card"><h2>⏳ 账号审核中</h2><button onclick="localStorage.removeItem('club_gamer_session');location.reload()">重新登录</button></div>`; return; }
    
    let announcements = getAnnouncements();
    let myOrders = getOrders().filter(o => o.gamerId === g.gid);
    let availableOrders = getOrders().filter(o => (o.status === 'waiting' || o.status === 'waiting_assign') && (!o.gamerId || o.gamerId === g.gid));
    let settings = getSettings();
    let verifyStatus = g.verifyStatus || 'not';
    let canAccept = (verifyStatus === 'verified');
    
    let levelName = '新手打手';
    if (g.level === 'gold_gamer') levelName = '金牌打手';
    else if (g.level === 'senior_gamer') levelName = '资深打手';
    
    let html = `<div class="card">${announcements.gamer ? `<div style="background:#fef3c7; padding:12px; border-radius:20px; margin-bottom:12px;">📢 ${announcements.gamer}</div>` : ''}<h2>🔫 ${g.username}</h2><div>💰 余额：${g.balance} 元</div><div>⭐ 等级：${levelName} | 单量：${g.totalOrders || 0}</div><div>实名：${verifyStatus === 'verified' ? '✅已认证' : verifyStatus === 'pending' ? '⏳审核中' : verifyStatus === 'rejected' ? '❌被拒' : '未认证'}</div><div class="flex"><button id="logoutBtn" style="background:#64748b;">退出</button><button id="withdrawBtn">提现</button></div></div>`;
    
    if (verifyStatus !== 'verified') {
        html += `<div class="card"><h3>📋 实名认证（需满18岁）</h3>${verifyStatus === 'pending' ? '<p>审核中，请耐心等待</p>' : verifyStatus === 'rejected' ? '<p>认证被拒，请重新提交真实信息</p>' : `<input id="realName" placeholder="真实姓名"><input id="idCard" placeholder="身份证号（18位）"><button id="submitVerifyBtn">提交认证</button><div style="font-size:12px;color:#64748b;">⚠️ 必须年满18周岁</div>`}</div>`;
    }
    html += `<div class="card"><h3>🛠️ 技能报价</h3><div id="skillsList"></div><div class="flex"><select id="skillType"><option value="段位">段位</option><option value="物资">物资</option></select><input id="skillTarget" placeholder="目标"><input id="skillPrice" placeholder="价格"></div><button id="addSkill">添加技能</button></div>
    <div class="card"><h3>📢 可接订单</h3><div id="availableOrders"></div></div>
    <div class="card"><h3>📋 我的接单</h3><div id="myOrdersList"></div></div>`;
    container.innerHTML = html;
    
    document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('club_gamer_session'); render(); });
    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
        let minAmt = settings.minWithdrawGamer || 25;
        let amt = prompt(`提现金额（最低${minAmt}元）`), acc = prompt("支付宝账号");
        if (amt && acc && parseInt(amt) >= minAmt) {
            let reqs = getWithdrawReqs();
            reqs.push({ id: Date.now(), userId: g.gid, amount: parseInt(amt), account: acc, status: 'pending', type: 'gamer' });
            setWithdrawReqs(reqs);
            alert("提现申请已提交");
        } else alert(`最低提现金额${minAmt}元`);
    });
    document.getElementById('submitVerifyBtn')?.addEventListener('click', () => {
        let realName = document.getElementById('realName').value.trim(), idCard = document.getElementById('idCard').value.trim();
        if (!realName || !idCard) { alert("请填写真实姓名和身份证号"); return; }
        if (!checkIdCard(idCard)) { alert("身份证号格式错误"); return; }
        let age = getAgeByIdCard(idCard);
        if (age === null || age < 18) { alert(`你当前年龄为 ${age} 岁，未满18周岁无法成为打手`); return; }
        let gamers = getGamers();
        let idx = gamers.findIndex(gg => gg.gid === g.gid);
        if (idx !== -1) { gamers[idx].realName = realName; gamers[idx].idCard = idCard.substring(0,10)+'****'; gamers[idx].verifyStatus = 'pending'; setGamers(gamers); }
        alert(`实名认证已提交，等待管理员审核。你已满 ${age} 岁。`);
        render();
    });
    // 技能
    let skillsDiv = document.getElementById('skillsList');
    if (skillsDiv) {
        skillsDiv.innerHTML = (g.skills || []).map((s, idx) => `<div>${s.type}·${s.target} ¥${s.price} <button class="delSkill" data-idx="${idx}">删除</button></div>`).join('');
        document.querySelectorAll('.delSkill').forEach(btn => { btn.addEventListener('click', () => { let idx = parseInt(btn.dataset.idx); if (isNaN(idx)) return; g.skills.splice(idx,1); let gamers = getGamers(); let i = gamers.findIndex(gg => gg.gid === g.gid); if(i!==-1) gamers[i]=g; setGamers(gamers); render(); }); });
    }
    document.getElementById('addSkill')?.addEventListener('click', () => { let type = document.getElementById('skillType').value, target = document.getElementById('skillTarget').value, price = parseInt(document.getElementById('skillPrice').value); if(type && target && price) { if (!g.skills) g.skills = []; g.skills.push({type,target,price}); let gamers = getGamers(); let i = gamers.findIndex(gg => gg.gid === g.gid); if(i!==-1) gamers[i]=g; setGamers(gamers); render(); } else alert("填完整"); });
    // 可接订单
    let availDiv = document.getElementById('availableOrders');
    if (availDiv) {
        if (!canAccept && availableOrders.length > 0) { availDiv.innerHTML = `<div class="order-item">⚠️ 请先完成实名认证才能接单</div>`; }
        else if (!availableOrders || availableOrders.length === 0) { availDiv.innerHTML = "<div>暂无订单</div>"; }
        else { availDiv.innerHTML = availableOrders.map(o => `<div class="order-item"><b>${o.game || '游戏'}</b> | ${o.userName} 出价 ¥${o.price}<br>需求：${o.description}<br>类型：${o.gamerId ? '🎯 专属单' : '普通单'}<button class="acceptOrder" data-oid="${o.oid}">接单</button></div>`).join('');
        document.querySelectorAll('.acceptOrder').forEach(btn => { btn.addEventListener('click', () => { let oid = btn.dataset.oid, orders = getOrders(), ord = orders.find(x => x.oid === oid); if (ord && (ord.status === 'waiting' || ord.status === 'waiting_assign')) { ord.status = 'accepted'; ord.gamerId = g.gid; ord.gamerName = g.username; setOrders(orders); addLog('order', g.gid, '接单', `接单 ${oid}`); alert("接单成功"); render(); } }); }); }
    } }
    // 我的接单
    let myDiv = document.getElementById('myOrdersList');
    if (myDiv) {
        if (!myOrders || myOrders.length === 0) myDiv.innerHTML = "<div>暂无接单</div>";
        else { myDiv.innerHTML = myOrders.map(o => `<div class="order-item"><b>${o.game || '游戏'}</b> | ¥${o.price}<br>玩家：${o.userName}<br>需求：${o.description}<br>状态：${o.status}<br><div class="chat-box" id="chat-${o.oid}">${(o.messages || []).map(m => `<div class="chat-msg ${m.from === 'gamer' ? 'gamer' : ''}">${m.from === 'gamer' ? '我' : o.userName}：${m.content}</div>`).join('')}</div><div class="flex"><input id="msgInput-${o.oid}" placeholder="回复游戏ID..."><button class="sendMsgBtn" data-oid="${o.oid}">发送</button></div>${o.status === 'in_progress' ? `<button class="finishOrderBtn" data-oid="${o.oid}">✅ 标记完成</button>` : ''}</div>`).join('');
        document.querySelectorAll('.sendMsgBtn').forEach(btn => { btn.addEventListener('click', () => { let oid = btn.dataset.oid, input = document.getElementById(`msgInput-${oid}`), msg = input.value.trim(); if (!msg) return; let ordersArr = getOrders(), ord = ordersArr.find(x => x.oid === oid); if (ord) { ord.messages = ord.messages || []; ord.messages.push({ from: 'gamer', content: msg, time: Date.now() }); setOrders(ordersArr); input.value = ''; render(); } }); });
        document.querySelectorAll('.finishOrderBtn').forEach(btn => { btn.addEventListener('click', () => { let oid = btn.dataset.oid, ordersArr = getOrders(), ord = ordersArr.find(x => x.oid === oid); if (ord && ord.status === 'in_progress') { ord.status = 'completed'; setOrders(ordersArr); alert("已标记完成，等待用户确认结算"); render(); } }); }); } }
    }
}
render();
</script>
</body>
</html>
