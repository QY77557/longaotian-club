<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>龙傲天俱乐部 · 玩家中心</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #ffffff; margin: 0; padding: 15px; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #1e293b; }
        .container { max-width: 650px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 18px; border: 1px solid #e2e8f0; }
        h2, h3 { color: #0f172a; margin: 0 0 12px 0; border-left: 4px solid #f5c542; padding-left: 12px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #cbd5e1; font-size: 15px; background: white; color: #0f172a; }
        button { background: #f5c542; font-weight: bold; border: none; cursor: pointer; }
        .gray-btn { background: #e2e8f0; border: 1px solid #cbd5e1; }
        .balance { font-size: 28px; font-weight: bold; color: #f5c542; }
        .order-item, .equip-item { background: #f8fafc; border-radius: 20px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #f5c542; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .announcement { background: #fef3c7; padding: 12px; border-radius: 16px; margin-bottom: 12px; font-size: 14px; }
        .qrcode-area { text-align: center; margin: 12px 0; padding: 16px; background: #f8fafc; border-radius: 20px; display: none; }
        .qrcode-img { max-width: 180px; border-radius: 16px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
(function() {
    const SHOUKUANMA_URL = "https://i.postimg.cc/63SD7J84/mm-facetoface-collect-qrcode-1778001786663.png";
    
    // 初始化空数据（无默认账号）
    if (!localStorage.getItem('club_users')) {
        localStorage.setItem('club_users', JSON.stringify([]));
    }
    if (!localStorage.getItem('club_gamers')) {
        localStorage.setItem('club_gamers', JSON.stringify([]));
    }
    if (!localStorage.getItem('club_orders')) localStorage.setItem('club_orders', JSON.stringify([]));
    if (!localStorage.getItem('club_equipment')) localStorage.setItem('club_equipment', JSON.stringify([]));
    if (!localStorage.getItem('club_admin')) localStorage.setItem('club_admin', JSON.stringify({ loginId: 'admin', pwd: 'admin123' }));
    if (!localStorage.getItem('club_recharge_reqs')) localStorage.setItem('club_recharge_reqs', JSON.stringify([]));
    if (!localStorage.getItem('club_withdraw_reqs')) localStorage.setItem('club_withdraw_reqs', JSON.stringify([]));
    if (!localStorage.getItem('club_complaints')) localStorage.setItem('club_complaints', JSON.stringify([]));
    if (!localStorage.getItem('club_announcements')) localStorage.setItem('club_announcements', JSON.stringify({ user: '', gamer: '' }));

    function getUsers() { return JSON.parse(localStorage.getItem('club_users') || '[]'); }
    function setUsers(v) { localStorage.setItem('club_users', JSON.stringify(v)); }
    function getGamers() { return JSON.parse(localStorage.getItem('club_gamers') || '[]'); }
    function setGamers(v) { localStorage.setItem('club_gamers', JSON.stringify(v)); }
    function getOrders() { return JSON.parse(localStorage.getItem('club_orders') || '[]'); }
    function setOrders(v) { localStorage.setItem('club_orders', JSON.stringify(v)); }
    function getEquipment() { return JSON.parse(localStorage.getItem('club_equipment') || '[]'); }
    function setEquipment(v) { localStorage.setItem('club_equipment', JSON.stringify(v)); }
    function getRechargeReqs() { return JSON.parse(localStorage.getItem('club_recharge_reqs') || '[]'); }
    function setRechargeReqs(v) { localStorage.setItem('club_recharge_reqs', JSON.stringify(v)); }
    function getWithdrawReqs() { return JSON.parse(localStorage.getItem('club_withdraw_reqs') || '[]'); }
    function setWithdrawReqs(v) { localStorage.setItem('club_withdraw_reqs', JSON.stringify(v)); }
    function getComplaints() { return JSON.parse(localStorage.getItem('club_complaints') || '[]'); }
    function setComplaints(v) { localStorage.setItem('club_complaints', JSON.stringify(v)); }
    function getAnnouncements() { return JSON.parse(localStorage.getItem('club_announcements') || '{"user":"","gamer":""}'); }

    let currentUser = null;
    function saveSession(user) { currentUser = user; localStorage.setItem('club_session', JSON.stringify(user ? { uid: user.uid, role: 'user' } : null)); renderApp(); }
    function getSession() { let raw = localStorage.getItem('club_session'); if (!raw) return null; let sess = JSON.parse(raw); if (!sess) return null; let users = getUsers(); return users.find(u => u.uid === sess.uid) || null; }
    function changeUserBalance(uid, amt) { let users = getUsers(); let u = users.find(x => x.uid === uid); if (u) { u.balance += amt; setUsers(users); } if (currentUser?.uid === uid) currentUser = u; renderApp(); }

    function autoPrice(desc, seg, mat) { let base = 30; if (desc.includes('王牌')) base += 50; if (desc.includes('皇冠')) base += 30; if (seg === '王牌') base += 50; else if (seg === '皇冠') base += 30; if (mat === '热成像') base += 40; return base; }

    function renderApp() {
        let container = document.getElementById('app');
        if (!container) return;
        let sess = getSession();
        if (!sess) {
            renderLogin();
            return;
        }
        currentUser = sess;
        if (currentUser.banned) { container.innerHTML = `<div class="card"><h2>⛔ 账号已被封禁</h2></div>`; return; }
        renderUserPanel();
    }

    function renderLogin() {
        let html = `
            <div class="card">
                <h2>🐉 龙傲天俱乐部</h2>
                <h3>登录</h3>
                <input id="loginId" placeholder="账号">
                <input id="loginPwd" type="password" placeholder="密码">
                <button id="loginBtn">登录</button>
                <hr>
                <h3>注册</h3>
                <input id="regName" placeholder="昵称">
                <input id="regLoginId" placeholder="账号">
                <input id="regPwd" type="password" placeholder="密码">
                <button id="regBtn">注册</button>
                <div style="margin-top:12px; font-size:12px; color:#64748b;">打手账号由管理员创建</div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
        document.getElementById('loginBtn')?.addEventListener('click', () => {
            let id = document.getElementById('loginId').value, pwd = document.getElementById('loginPwd').value;
            let users = getUsers();
            let user = users.find(u => u.loginId === id && u.pwd === pwd);
            if (user) { saveSession(user); return; }
            let gamers = getGamers();
            let gamer = gamers.find(g => g.loginId === id && g.pwd === pwd);
            if (gamer) { saveSession({ ...gamer, role: 'gamer', uid: gamer.gid }); location.href = '打手.html'; return; }
            let admin = JSON.parse(localStorage.getItem('club_admin'));
            if (id === admin.loginId && pwd === admin.pwd) { localStorage.setItem('club_session', JSON.stringify({ uid: 'admin', role: 'admin' })); location.href = '管理员.html'; return; }
            alert("账号或密码错误");
        });
        document.getElementById('regBtn')?.addEventListener('click', () => {
            let name = document.getElementById('regName').value, lid = document.getElementById('regLoginId').value, pwd = document.getElementById('regPwd').value;
            if (!name || !lid || !pwd) { alert("填完整"); return; }
            let users = getUsers();
            if (users.find(u => u.loginId === lid)) { alert("账号已存在"); return; }
            let newUser = { uid: 'u' + Date.now(), username: name, loginId: lid, pwd: pwd, balance: 0, banned: false, role: 'user' };
            users.push(newUser);
            setUsers(users);
            saveSession(newUser);
        });
    }

    function renderUserPanel() {
        let u = currentUser;
        let announcements = getAnnouncements();
        let orders = getOrders().filter(o => o.userId === u.uid);
        let gamers = getGamers().filter(g => !g.banned && g.approved);
        let equipments = getEquipment().filter(e => e.status === '出售' && e.sellerId !== u.uid);
        let myEquipments = getEquipment().filter(e => e.sellerId === u.uid);
        let complaints = getComplaints().filter(c => c.userId === u.uid);
        
        let html = `
            <div class="card">
                ${announcements.user ? `<div class="announcement">📢 ${announcements.user}</div>` : ''}
                <h2>🐉 ${u.username}</h2>
                <div>💰 余额：<span class="balance">${u.balance}</span> 元</div>
                <div class="flex"><button id="logoutBtn" class="gray-btn">切换账号</button><button id="withdrawBtn" class="gray-btn">提现</button></div>
            </div>
            <div class="card">
                <h3>💰 充值</h3>
                <select id="rechargeAmount"><option value="10">10元</option><option value="30">30元</option><option value="50">50元</option><option value="100">100元</option></select>
                <div id="qrcodeArea" class="qrcode-area"><p>👇 扫码支付后上传截图 👇</p><img id="qrcodeImg" class="qrcode-img" src="${SHOUKUANMA_URL}"></div>
                <input id="rechargeProof" placeholder="付款截图链接"><button id="showQrBtn">📷 显示收款码</button><button id="submitRechargeBtn">提交充值申请</button>
            </div>
            <div class="card">
                <h3>📝 发布订单</h3>
                <select id="orderGame">
                    <option value="和平精英">和平精英</option>
                    <option value="地铁逃生">地铁逃生</option>
                    <option value="百万撤离">百万撤离</option>
                    <option value="千万撤离">千万撤离</option>
                    <option value="PUBG">PUBG</option>
                    <option value="三角洲行动">三角洲行动</option>
                    <option value="吃丹修仙">吃丹修仙</option>
                </select>
                <textarea id="orderDesc" rows="2" placeholder="需求描述（如：撤离1000万、上王牌等）"></textarea>
                <select id="targetGamer"><option value="">-- 指定打手（可选） --</option>${gamers.map(g => `<option value="${g.gid}|${g.username}">${g.username}</option>`).join('')}</select>
                <input id="orderPrice" placeholder="价格（元）" type="number">
                <button id="publishBtn">发布订单</button>
            </div>
            <div class="card"><h3>📋 我的订单</h3><div id="myOrders"></div></div>
            <div class="card"><h3>🛒 装备市场</h3>
                <input id="equipTitle" placeholder="装备名称"><input id="equipPrice" placeholder="价格"><input id="equipImg" placeholder="图片链接"><input id="equipContact" placeholder="联系方式"><button id="publishEquipBtn">上架装备</button>
                <div id="equipList"></div>
            </div>
            <div class="card"><h3>📞 投诉</h3>
                <select id="complaintOrder"><option value="">-- 选择订单 --</option></select>
                <textarea id="complaintReason" rows="2" placeholder="投诉原因"></textarea><button id="submitComplaintBtn">提交投诉</button>
                <div id="myComplaints"></div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;

        // 充值
        document.getElementById('showQrBtn')?.addEventListener('click', () => { document.getElementById('qrcodeArea').style.display = 'block'; alert("扫码付款后上传截图链接"); });
        document.getElementById('submitRechargeBtn')?.addEventListener('click', () => {
            let amount = document.getElementById('rechargeAmount').value, proof = document.getElementById('rechargeProof').value;
            if (!proof) { alert("请上传付款截图链接"); return; }
            let reqs = getRechargeReqs();
            reqs.push({ id: Date.now(), userId: u.uid, amount: parseInt(amount), proof, status: 'pending', type: 'user' });
            setRechargeReqs(reqs);
            alert("充值申请已提交");
            document.getElementById('rechargeProof').value = '';
            document.getElementById('qrcodeArea').style.display = 'none';
            renderApp();
        });

        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('club_session'); renderApp(); });
        document.getElementById('withdrawBtn')?.addEventListener('click', () => {
            let amt = prompt("提现金额"), acc = prompt("支付宝账号");
            if (amt && acc) { let reqs = getWithdrawReqs(); reqs.push({ id: Date.now(), userId: u.uid, amount: parseInt(amt), account: acc, status: 'pending', type: 'user' }); setWithdrawReqs(reqs); alert("提现申请已提交"); renderApp(); }
        });

        // 发布订单
        let desc = document.getElementById('orderDesc'), seg = null, mat = null;
        let updatePrice = () => { let price = autoPrice(desc?.value || '', '', ''); document.getElementById('pricePreview') && (document.getElementById('pricePreview').innerText = price); };
        document.getElementById('publishBtn')?.addEventListener('click', () => {
            let game = document.getElementById('orderGame').value, d = desc.value, targetVal = document.getElementById('targetGamer').value, price = parseInt(document.getElementById('orderPrice').value);
            if (!game || !d || !price) { alert("请完整填写游戏、需求和价格"); return; }
            let targetGamerId = null, targetGamerName = null;
            if (targetVal) { let parts = targetVal.split('|'); targetGamerId = parts[0]; targetGamerName = parts[1]; }
            let ordersArr = getOrders();
            ordersArr.push({ oid: 'o' + Date.now(), userId: u.uid, userName: u.username, game, description: d, price, status: targetGamerId ? 'waiting_assign' : 'waiting', gamerId: targetGamerId, gamerName: targetGamerName, messages: [], createTime: Date.now() });
            setOrders(ordersArr);
            alert(targetGamerId ? `已向 ${targetGamerName} 发起点单` : "订单已发布");
            renderApp();
        });

        // 我的订单
        let orderDiv = document.getElementById('myOrders');
        if (orderDiv) {
            if (orders.length === 0) orderDiv.innerHTML = "<div>暂无订单</div>";
            else {
                orderDiv.innerHTML = orders.map(o => `
                    <div class="order-item" data-oid="${o.oid}">
                        <b>${o.game}</b> | ¥${o.price}<br>需求：${o.description}<br>状态：${o.status === 'waiting' ? '等待接单' : o.status === 'waiting_assign' ? `已指定${o.gamerName}` : o.status === 'accepted' ? '打手已接单' : o.status === 'in_progress' ? '进行中' : '已完成'}<br>打手：${o.gamerName || '未指定'}<br>
                        <div class="chat-box" id="chat-${o.oid}">${(o.messages || []).map(m => `<div class="chat-msg ${m.from === 'user' ? 'user' : 'gamer'}">${m.from === 'user' ? '我' : o.gamerName}：${m.content}</div>`).join('')}</div>
                        <div class="flex"><input id="msgInput-${o.oid}" placeholder="发送游戏ID..."><button class="sendMsgBtn" data-oid="${o.oid}">发送</button></div>
                        ${o.status === 'accepted' ? `<button class="startOrderBtn" data-oid="${o.oid}">📞 已发送ID，开始打</button>` : ''}
                        ${o.status === 'in_progress' ? `<button class="completeOrderBtn" data-oid="${o.oid}">✅ 确认完成</button>` : ''}
                        ${(o.status === 'waiting' || o.status === 'waiting_assign') ? `<button class="cancelOrderBtn" data-oid="${o.oid}">❌ 取消订单</button>` : ''}
                    </div>
                `).join('');
                document.querySelectorAll('.sendMsgBtn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        let oid = btn.dataset.oid, input = document.getElementById(`msgInput-${oid}`), msg = input.value.trim();
                        if (!msg) return;
                        let ordersArr = getOrders(), ord = ordersArr.find(x => x.oid === oid);
                        if (ord) { if (!ord.messages) ord.messages = []; ord.messages.push({ from: 'user', content: msg, time: Date.now() }); setOrders(ordersArr); input.value = ''; renderApp(); }
                    });
                });
                document.querySelectorAll('.startOrderBtn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        let oid = btn.dataset.oid, ordersArr = getOrders(), ord = ordersArr.find(x => x.oid === oid);
                        if (ord && ord.status === 'accepted') { ord.status = 'in_progress'; setOrders(ordersArr); alert("已通知打手开始"); renderApp(); }
                    });
                });
                document.querySelectorAll('.completeOrderBtn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        let oid = btn.dataset.oid, ordersArr = getOrders(), ord = ordersArr.find(x => x.oid === oid);
                        if (ord && ord.status === 'in_progress') {
                            let users = getUsers(), user = users.find(uu => uu.uid === ord.userId);
                            if (user && user.balance >= ord.price) {
                                user.balance -= ord.price; setUsers(users);
                                let gamers = getGamers(), gamer = gamers.find(g => g.gid === ord.gamerId);
                                if (gamer) { gamer.balance += ord.price; gamer.totalOrders += 1; setGamers(gamers); }
                                ord.status = 'completed'; setOrders(ordersArr);
                                alert("订单完成，款项已支付给打手"); renderApp();
                            } else alert("余额不足，请充值");
                        }
                    });
                });
                document.querySelectorAll('.cancelOrderBtn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        let oid = btn.dataset.oid, ordersArr = getOrders(), ord = ordersArr.find(x => x.oid === oid);
                        if (ord && (ord.status === 'waiting' || ord.status === 'waiting_assign')) { ord.status = 'cancelled'; setOrders(ordersArr); alert("订单已取消"); renderApp(); }
                    });
                });
            }
        }

        // 装备市场
        document.getElementById('publishEquipBtn')?.addEventListener('click', () => {
            let title = document.getElementById('equipTitle').value, price = parseInt(document.getElementById('equipPrice').value), img = document.getElementById('equipImg').value, contact = document.getElementById('equipContact').value;
            if (!title || !price || !img || !contact) { alert("请完整填写"); return; }
            let eqs = getEquipment();
            eqs.push({ eid: 'e' + Date.now(), sellerId: u.uid, sellerName: u.username, title, price, imgUrl: img, contact, status: '出售', createTime: Date.now() });
            setEquipment(eqs);
            alert("装备已上架");
            renderApp();
        });
        let equipDiv = document.getElementById('equipList');
        if (equipDiv) {
            if (equipments.length === 0) equipDiv.innerHTML = "<div>暂无装备</div>";
            else {
                equipDiv.innerHTML = equipments.map(e => `<div class="equip-item"><b>${e.title}</b> ¥${e.price}<br><img src="${e.imgUrl}" style="max-width:100px; border-radius:8px;"><br>卖家：${e.sellerName}<br><button class="buyEquip" data-eid="${e.eid}" data-price="${e.price}" data-seller="${e.sellerId}">购买</button></div>`).join('');
                document.querySelectorAll('.buyEquip').forEach(btn => {
                    btn.addEventListener('click', () => {
                        let eid = btn.dataset.eid, price = parseInt(btn.dataset.price), sellerId = btn.dataset.seller;
                        if (u.balance >= price) {
                            let users = getUsers(), buyer = users.find(us => us.uid === u.uid), seller = users.find(us => us.uid === sellerId);
                            if (buyer && seller) { buyer.balance -= price; seller.balance += price; setUsers(users); setEquipment(getEquipment().filter(eq => eq.eid !== eid)); alert("购买成功"); renderApp(); }
                            else alert("卖家不存在");
                        } else alert("余额不足");
                    });
                });
            }
        }

        // 投诉
        let completedOrders = orders.filter(o => o.status === 'completed');
        let selectEl = document.getElementById('complaintOrder');
        if (selectEl) selectEl.innerHTML = '<option value="">-- 选择订单 --</option>' + completedOrders.map(o => `<option value="${o.oid}">${o.game} - ¥${o.price}</option>`).join('');
        document.getElementById('submitComplaintBtn')?.addEventListener('click', () => {
            let oid = document.getElementById('complaintOrder').value, reason = document.getElementById('complaintReason').value;
            if (!oid || !reason) { alert("请选择订单并填写原因"); return; }
            let order = getOrders().find(o => o.oid === oid);
            if (!order) return;
            let comps = getComplaints();
            comps.push({ id: Date.now(), oid, userId: u.uid, userName: u.username, gamerId: order.gamerId, gamerName: order.gamerName, reason, status: 'pending', createTime: Date.now() });
            setComplaints(comps);
            alert("投诉已提交");
            document.getElementById('complaintReason').value = '';
            renderApp();
        });
        let complaintsDiv = document.getElementById('myComplaints');
        if (complaintsDiv) {
            if (complaints.length === 0) complaintsDiv.innerHTML = "<div>暂无投诉</div>";
            else complaintsDiv.innerHTML = complaints.map(c => `<div class="order-item">订单：${c.oid?.slice(-6)} 打手：${c.gamerName}<br>原因：${c.reason}<br>状态：${c.status === 'pending' ? '处理中' : '已处理'}</div>`).join('');
        }
    }
    renderApp();
})();
</script>
</body>
</html>
