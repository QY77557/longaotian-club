<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>龙傲天俱乐部 · 管理后台</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #ffffff; margin: 0; padding: 15px; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 18px; border: 1px solid #e2e8f0; }
        h2, h3 { color: #0f172a; margin: 0 0 12px 0; border-left: 4px solid #f5c542; padding-left: 12px; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 40px; border: 1px solid #cbd5e1; background: white; color: #0f172a; font-size: 14px; }
        button { background: #f5c542; font-weight: bold; border: none; cursor: pointer; }
        .gray-btn { background: #e2e8f0; border: 1px solid #cbd5e1; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .order-item { background: #f8fafc; border-radius: 20px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #f5c542; }
        .verify-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .verified { background: #dcfce7; color: #166534; }
        .pending { background: #fef3c7; color: #92400e; }
        .rejected { background: #fee2e2; color: #991b1b; }
        .not { background: #e2e8f0; color: #475569; }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
(function() {
    // 初始化数据
    if (!localStorage.getItem('club_users')) {
        localStorage.setItem('club_users', JSON.stringify([
            { uid: 'u1', username: '测试玩家', loginId: 'player', pwd: '111', balance: 500, banned: false, role: 'user' }
        ]));
    }
    if (!localStorage.getItem('club_gamers')) {
        localStorage.setItem('club_gamers', JSON.stringify([
            { gid: 'g1', username: '墨渊', loginId: 'moyuan', pwd: '123456', skills: [], balance: 0, banned: false, avgRating: 4.8, totalOrders: 0, approved: true, verifyStatus: 'verified', realName: '墨渊', idCard: '********' }
        ]));
    }
    if (!localStorage.getItem('club_orders')) localStorage.setItem('club_orders', JSON.stringify([]));
    if (!localStorage.getItem('club_equipment')) localStorage.setItem('club_equipment', JSON.stringify([]));
    if (!localStorage.getItem('club_admin')) localStorage.setItem('club_admin', JSON.stringify({ loginId: 'admin', pwd: 'admin123' }));
    if (!localStorage.getItem('club_recharge_reqs')) localStorage.setItem('club_recharge_reqs', JSON.stringify([]));
    if (!localStorage.getItem('club_withdraw_reqs')) localStorage.setItem('club_withdraw_reqs', JSON.stringify([]));
    if (!localStorage.getItem('club_complaints')) localStorage.setItem('club_complaints', JSON.stringify([]));
    if (!localStorage.getItem('club_announcements')) localStorage.setItem('club_announcements', JSON.stringify({ user: '', gamer: '' }));

    function getUsers() { return JSON.parse(localStorage.getItem('club_users') || '[]'); }
    function setUsers(v) { localStorage.setItem('club_users', JSON.stringify(v)); }
    function getGamers() { return JSON.parse(localStorage.getItem('club_gamers') || '[]'); }
    function setGamers(v) { localStorage.setItem('club_gamers', JSON.stringify(v)); }
    function getOrders() { return JSON.parse(localStorage.getItem('club_orders') || '[]'); }
    function setOrders(v) { localStorage.setItem('club_orders', JSON.stringify(v)); }
    function getEquipment() { return JSON.parse(localStorage.getItem('club_equipment') || '[]'); }
    function setEquipment(v) { localStorage.setItem('club_equipment', JSON.stringify(v)); }
    function getRechargeReqs() { return JSON.parse(localStorage.getItem('club_recharge_reqs') || '[]'); }
    function setRechargeReqs(v) { localStorage.setItem('club_recharge_reqs', JSON.stringify(v)); }
    function getWithdrawReqs() { return JSON.parse(localStorage.getItem('club_withdraw_reqs') || '[]'); }
    function setWithdrawReqs(v) { localStorage.setItem('club_withdraw_reqs', JSON.stringify(v)); }
    function getComplaints() { return JSON.parse(localStorage.getItem('club_complaints') || '[]'); }
    function setComplaints(v) { localStorage.setItem('club_complaints', JSON.stringify(v)); }
    function getAnnouncements() { return JSON.parse(localStorage.getItem('club_announcements') || '{"user":"","gamer":""}'); }
    function setAnnouncements(v) { localStorage.setItem('club_announcements', JSON.stringify(v)); }

    let currentAdmin = null;
    function saveAdmin(user) { currentAdmin = user; localStorage.setItem('club_admin_session', JSON.stringify(user ? { uid: user.uid } : null)); render(); }
    function getSession() { let raw = localStorage.getItem('club_admin_session'); if (!raw) return null; let sess = JSON.parse(raw); if (!sess) return null; let admin = JSON.parse(localStorage.getItem('club_admin')); if (sess.uid === 'admin') return { uid: 'admin', role: 'admin' }; return null; }
    function changeUserBalance(uid, amount) { let users = getUsers(); let u = users.find(x => x.uid === uid); if (u) u.balance += amount; setUsers(users); render(); }
    function changeGamerBalance(gid, amount) { let gamers = getGamers(); let g = gamers.find(x => x.gid === gid); if (g) g.balance += amount; setGamers(gamers); render(); }

    function render() {
        let container = document.getElementById('app');
        if (!container) return;
        let sess = getSession();
        if (!sess) {
            container.innerHTML = `
                <div class="card">
                    <h2>👑 龙傲天俱乐部 · 管理后台</h2>
                    <input type="text" id="adminUser" placeholder="账号">
                    <input type="password" id="adminPwd" placeholder="密码">
                    <button id="loginBtn">登录</button>
                    <div style="margin-top:12px; font-size:12px; color:#64748b;">演示账号: admin / admin123</div>
                </div>
            `;
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                let user = document.getElementById('adminUser').value, pwd = document.getElementById('adminPwd').value;
                let admin = JSON.parse(localStorage.getItem('club_admin'));
                if (user === admin.loginId && pwd === admin.pwd) { saveAdmin({ uid: 'admin' }); } else alert("账号或密码错误");
            });
            return;
        }

        let users = getUsers();
        let gamers = getGamers();
        let orders = getOrders();
        let equipments = getEquipment();
        let rechargeReqs = getRechargeReqs();
        let withdrawReqs = getWithdrawReqs();
        let complaints = getComplaints();
        let announcements = getAnnouncements();
        
        let html = `
            <div class="card">
                <h2>👑 龙傲天俱乐部 · 管理后台</h2>
                <button id="logoutBtn" class="gray-btn">退出登录</button>
            </div>
            <div class="card">
                <h3>📊 统计</h3>
                <div>👥 玩家：${users.length} | 🔫 打手：${gamers.length} | 📦 订单：${orders.length} | 💰 装备：${equipments.length}</div>
                <div>⏳ 待审实名：${gamers.filter(g => g.verifyStatus === 'pending').length} | 📝 待审充值：${rechargeReqs.length} | 💸 待审提现：${withdrawReqs.length} | ⚠️ 投诉：${complaints.length}</div>
            </div>
            <div class="card">
                <h3>📢 发送公告</h3>
                <textarea id="userAnnouncement" rows="2" placeholder="用户公告">${announcements.user}</textarea>
                <button id="sendUserAnnouncement">发送用户公告</button>
                <textarea id="gamerAnnouncement" rows="2" placeholder="打手公告">${announcements.gamer}</textarea>
                <button id="sendGamerAnnouncement">发送打手公告</button>
            </div>
            <div class="card">
                <h3>➕ 创建玩家账号</h3>
                <div class="flex"><input id="newUserName" placeholder="昵称"><input id="newUserLogin" placeholder="账号"><input id="newUserPwd" placeholder="密码"></div>
                <button id="createUserBtn">创建玩家</button>
            </div>
            <div class="card">
                <h3>➕ 创建打手账号</h3>
                <div class="flex"><input id="newGamerName" placeholder="昵称"><input id="newGamerLogin" placeholder="账号"><input id="newGamerPwd" placeholder="密码"></div>
                <button id="createGamerBtn">创建打手</button>
            </div>
            <div class="card">
                <h3>👥 玩家管理</h3>
                <div id="userList"></div>
            </div>
            <div class="card">
                <h3>🔫 打手管理（含实名审核）</h3>
                <div id="gamerListAdmin"></div>
            </div>
            <div class="card">
                <h3>💰 充值审核</h3>
                <div id="rechargeReqs"></div>
            </div>
            <div class="card">
                <h3>💸 提现审核</h3>
                <div id="withdrawReqs"></div>
            </div>
            <div class="card">
                <h3>⚠️ 投诉管理</h3>
                <div id="complaintListAdmin"></div>
            </div>
        `;
        container.innerHTML = html;
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('club_admin_session'); render(); });
        
        // 发送公告
        document.getElementById('sendUserAnnouncement')?.addEventListener('click', () => {
            let ann = getAnnouncements();
            ann.user = document.getElementById('userAnnouncement').value;
            setAnnouncements(ann);
            alert("用户公告已发送");
        });
        document.getElementById('sendGamerAnnouncement')?.addEventListener('click', () => {
            let ann = getAnnouncements();
            ann.gamer = document.getElementById('gamerAnnouncement').value;
            setAnnouncements(ann);
            alert("打手公告已发送");
        });
        
        // 创建玩家
        document.getElementById('createUserBtn')?.addEventListener('click', () => {
            let name = document.getElementById('newUserName').value, login = document.getElementById('newUserLogin').value, pwd = document.getElementById('newUserPwd').value;
            if (!name || !login || !pwd) { alert("填完整"); return; }
            let usersArr = getUsers();
            if (usersArr.find(u => u.loginId === login)) { alert("账号已存在"); return; }
            usersArr.push({ uid: 'u' + Date.now(), username: name, loginId: login, pwd: pwd, balance: 0, banned: false, role: 'user' });
            setUsers(usersArr);
            alert("玩家创建成功");
            render();
        });
        
        // 创建打手
        document.getElementById('createGamerBtn')?.addEventListener('click', () => {
            let name = document.getElementById('newGamerName').value, login = document.getElementById('newGamerLogin').value, pwd = document.getElementById('newGamerPwd').value;
            if (!name || !login || !pwd) { alert("填完整"); return; }
            let gamersArr = getGamers();
            if (gamersArr.find(g => g.loginId === login)) { alert("账号已存在"); return; }
            gamersArr.push({ 
                gid: 'g' + Date.now(), username: name, loginId: login, pwd: pwd, 
                skills: [], balance: 0, banned: false, avgRating: 0, totalOrders: 0, 
                approved: true, verifyStatus: 'not', realName: null, idCard: null 
            });
            setGamers(gamersArr);
            alert("打手创建成功");
            render();
        });
        
        // 玩家管理
        let userDiv = document.getElementById('userList');
        userDiv.innerHTML = users.map(u => `
            <div class="order-item">
                <b>${u.username}</b> | 余额 ¥${u.balance} | ${u.banned ? '<span style="color:red;">已封禁</span>' : '正常'}
                <div class="flex"><button class="banUser" data-uid="${u.uid}">${u.banned ? '解封' : '封禁'}</button><button class="addBalance" data-uid="${u.uid}">加余额</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.banUser').forEach(btn => {
            btn.addEventListener('click', () => { let uid = btn.dataset.uid; let arr = getUsers(); let u = arr.find(x => x.uid === uid); if (u) u.banned = !u.banned; setUsers(arr); render(); });
        });
        document.querySelectorAll('.addBalance').forEach(btn => {
            btn.addEventListener('click', () => { let uid = btn.dataset.uid; let amt = prompt("增加余额"); if (amt) { let arr = getUsers(); let u = arr.find(x => x.uid === uid); if (u) u.balance += parseInt(amt); setUsers(arr); render(); } });
        });
        
        // 打手管理（含实名审核）
        let gamerDiv = document.getElementById('gamerListAdmin');
        gamerDiv.innerHTML = gamers.map(g => {
            let verifyClass = '', verifyText = '';
            if (g.verifyStatus === 'verified') { verifyClass = 'verified'; verifyText = '已认证'; }
            else if (g.verifyStatus === 'pending') { verifyClass = 'pending'; verifyText = '待审核'; }
            else if (g.verifyStatus === 'rejected') { verifyClass = 'rejected'; verifyText = '已拒绝'; }
            else { verifyClass = 'not'; verifyText = '未认证'; }
            return `
            <div class="order-item">
                <b>${g.username}</b> | 余额 ¥${g.balance} | ${g.banned ? '<span style="color:red;">已封禁</span>' : '正常'}
                <div>实名：<span class="verify-badge ${verifyClass}">${verifyText}</span> ${g.realName ? `(${g.realName})` : ''}</div>
                <div class="flex">
                    ${g.verifyStatus === 'pending' ? `<button class="approveVerify" data-gid="${g.gid}">✅ 通过实名</button><button class="rejectVerify" data-gid="${g.gid}">❌ 拒绝实名</button>` : ''}
                    <button class="banGamer" data-gid="${g.gid}">${g.banned ? '解封' : '封禁'}</button>
                    <button class="addGamerBalance" data-gid="${g.gid}">加余额</button>
                    <button class="delGamer" data-gid="${g.gid}">删除</button>
                </div>
            </div>
        `}).join('');
        
        // 实名审核通过
        document.querySelectorAll('.approveVerify').forEach(btn => {
            btn.addEventListener('click', () => {
                let gid = btn.dataset.gid;
                let arr = getGamers();
                let g = arr.find(x => x.gid === gid);
                if (g) { g.verifyStatus = 'verified'; setGamers(arr); alert(`已通过 ${g.username} 的实名认证`); render(); }
            });
        });
        // 实名审核拒绝
        document.querySelectorAll('.rejectVerify').forEach(btn => {
            btn.addEventListener('click', () => {
                let gid = btn.dataset.gid;
                let arr = getGamers();
                let g = arr.find(x => x.gid === gid);
                if (g) { g.verifyStatus = 'rejected'; setGamers(arr); alert(`已拒绝 ${g.username} 的实名认证`); render(); }
            });
        });
        // 封禁打手
        document.querySelectorAll('.banGamer').forEach(btn => {
            btn.addEventListener('click', () => { let gid = btn.dataset.gid; let arr = getGamers(); let g = arr.find(x => x.gid === gid); if (g) g.banned = !g.banned; setGamers(arr); render(); });
        });
        // 打手加余额
        document.querySelectorAll('.addGamerBalance').forEach(btn => {
            btn.addEventListener('click', () => { let gid = btn.dataset.gid; let amt = prompt("增加余额"); if (amt) { let arr = getGamers(); let g = arr.find(x => x.gid === gid); if (g) g.balance += parseInt(amt); setGamers(arr); render(); } });
        });
        // 删除打手
        document.querySelectorAll('.delGamer').forEach(btn => {
            btn.addEventListener('click', () => { let gid = btn.dataset.gid; if (confirm("确定删除吗？")) { setGamers(getGamers().filter(x => x.gid !== gid)); render(); } });
        });
        
        // 充值审核
        let rechargeDiv = document.getElementById('rechargeReqs');
        if (rechargeReqs.length === 0) rechargeDiv.innerHTML = "<div>暂无充值申请</div>";
        else {
            rechargeDiv.innerHTML = rechargeReqs.map(r => `
                <div class="order-item">
                    <div>用户：${r.userId} | 金额：¥${r.amount} | 凭证：${r.proof || '已上传'}</div>
                    <div class="flex"><button class="confirmRecharge" data-id="${r.id}">✅ 确认到账</button><button class="rejectRecharge" data-id="${r.id}">❌ 驳回</button></div>
                </div>
            `).join('');
            document.querySelectorAll('.confirmRecharge').forEach(btn => {
                btn.addEventListener('click', () => {
                    let rid = parseInt(btn.dataset.id);
                    let reqs = getRechargeReqs();
                    let req = reqs.find(x => x.id === rid);
                    if (req) {
                        if (req.type === 'user') changeUserBalance(req.userId, req.amount);
                        else changeGamerBalance(req.userId, req.amount);
                        setRechargeReqs(reqs.filter(x => x.id !== rid));
                        alert("已到账");
                        render();
                    }
                });
            });
            document.querySelectorAll('.rejectRecharge').forEach(btn => {
                btn.addEventListener('click', () => {
                    let rid = parseInt(btn.dataset.id);
                    setRechargeReqs(getRechargeReqs().filter(x => x.id !== rid));
                    alert("已驳回");
                    render();
                });
            });
        }
        
        // 提现审核
        let withdrawDiv = document.getElementById('withdrawReqs');
        if (withdrawReqs.length === 0) withdrawDiv.innerHTML = "<div>暂无提现申请</div>";
        else {
            withdrawDiv.innerHTML = withdrawReqs.map(w => `
                <div class="order-item">
                    <div>用户：${w.userId} | 金额：¥${w.amount} | 账号：${w.account}</div>
                    <div class="flex"><button class="confirmWithdraw" data-id="${w.id}">✅ 确认打款</button><button class="rejectWithdraw" data-id="${w.id}">❌ 驳回</button></div>
                </div>
            `).join('');
            document.querySelectorAll('.confirmWithdraw').forEach(btn => {
                btn.addEventListener('click', () => {
                    let wid = parseInt(btn.dataset.id);
                    setWithdrawReqs(getWithdrawReqs().filter(x => x.id !== wid));
                    alert("已确认打款");
                    render();
                });
            });
            document.querySelectorAll('.rejectWithdraw').forEach(btn => {
                btn.addEventListener('click', () => {
                    let wid = parseInt(btn.dataset.id);
                    setWithdrawReqs(getWithdrawReqs().filter(x => x.id !== wid));
                    alert("已驳回");
                    render();
                });
            });
        }
        
        // 投诉管理
        let complaintDiv = document.getElementById('complaintListAdmin');
        if (complaints.length === 0) complaintDiv.innerHTML = "<div>暂无投诉</div>";
        else {
            complaintDiv.innerHTML = complaints.map(c => `
                <div class="order-item">
                    <div><b>订单号：${c.oid?.slice(-6) || '未知'}</b> | 玩家：${c.userName} | 打手：${c.gamerName}</div>
                    <div>投诉原因：${c.reason}</div>
                    <div class="flex"><button class="resolveComplaint" data-id="${c.id}">✅ 标记已处理</button><button class="deleteComplaint" data-id="${c.id}">🗑️ 删除</button></div>
                </div>
            `).join('');
            document.querySelectorAll('.resolveComplaint').forEach(btn => {
                btn.addEventListener('click', () => {
                    let cid = parseInt(btn.dataset.id);
                    let comps = getComplaints();
                    let comp = comps.find(x => x.id === cid);
                    if (comp) comp.status = 'resolved';
                    setComplaints(comps);
                    alert("已标记处理");
                    render();
                });
            });
            document.querySelectorAll('.deleteComplaint').forEach(btn => {
                btn.addEventListener('click', () => {
                    let cid = parseInt(btn.dataset.id);
                    setComplaints(getComplaints().filter(x => x.id !== cid));
                    alert("已删除");
                    render();
                });
            });
        }
    }
    render();
})();
</script>
</body>
</html>
