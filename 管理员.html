<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙傲天俱乐部 · 管理后台</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #f2f4f8; margin: 0; padding: 15px; font-family: system-ui; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h2, h3 { color: #0f172a; margin: 0 0 12px 0; border-left: 4px solid #f5c542; padding-left: 12px; }
        button, input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 40px; border: 1px solid #cbd5e1; background: white; color: #0f172a; }
        button { background: #f5c542; font-weight: bold; border: none; cursor: pointer; }
        .gray-btn { background: #e2e8f0; border: 1px solid #cbd5e1; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .order-item { background: #f8fafc; border-radius: 20px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #f5c542; }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
(function() {
    if (!localStorage.getItem('club_users')) localStorage.setItem('club_users', JSON.stringify([]));
    if (!localStorage.getItem('club_gamers')) localStorage.setItem('club_gamers', JSON.stringify([]));
    if (!localStorage.getItem('club_orders')) localStorage.setItem('club_orders', JSON.stringify([]));
    if (!localStorage.getItem('club_equipment')) localStorage.setItem('club_equipment', JSON.stringify([]));
    if (!localStorage.getItem('club_admin')) localStorage.setItem('club_admin', JSON.stringify({ loginId: 'admin', pwd: 'admin123' }));
    if (!localStorage.getItem('club_recharge_reqs')) localStorage.setItem('club_recharge_reqs', JSON.stringify([]));
    if (!localStorage.getItem('club_withdraw_reqs')) localStorage.setItem('club_withdraw_reqs', JSON.stringify([]));
    if (!localStorage.getItem('club_complaints')) localStorage.setItem('club_complaints', JSON.stringify([]));
    if (!localStorage.getItem('club_announcements')) localStorage.setItem('club_announcements', JSON.stringify({ user: '', gamer: '' }));

    function getUsers() { return JSON.parse(localStorage.getItem('club_users') || '[]'); }
    function setUsers(v) { localStorage.setItem('club_users', JSON.stringify(v)); }
    function getGamers() { return JSON.parse(localStorage.getItem('club_gamers') || '[]'); }
    function setGamers(v) { localStorage.setItem('club_gamers', JSON.stringify(v)); }
    function getOrders() { return JSON.parse(localStorage.getItem('club_orders') || '[]'); }
    function setOrders(v) { localStorage.setItem('club_orders', JSON.stringify(v)); }
    function getEquipment() { return JSON.parse(localStorage.getItem('club_equipment') || '[]'); }
    function setEquipment(v) { localStorage.setItem('club_equipment', JSON.stringify(v)); }
    function getRechargeReqs() { return JSON.parse(localStorage.getItem('club_recharge_reqs') || '[]'); }
    function setRechargeReqs(v) { localStorage.setItem('club_recharge_reqs', JSON.stringify(v)); }
    function getWithdrawReqs() { return JSON.parse(localStorage.getItem('club_withdraw_reqs') || '[]'); }
    function setWithdrawReqs(v) { localStorage.setItem('club_withdraw_reqs', JSON.stringify(v)); }
    function getComplaints() { return JSON.parse(localStorage.getItem('club_complaints') || '[]'); }
    function setComplaints(v) { localStorage.setItem('club_complaints', JSON.stringify(v)); }
    function getAnnouncements() { return JSON.parse(localStorage.getItem('club_announcements') || '{"user":"","gamer":""}'); }
    function setAnnouncements(v) { localStorage.setItem('club_announcements', JSON.stringify(v)); }

    let currentAdmin = null;
    function saveAdmin(user) {
        currentAdmin = user;
        localStorage.setItem('club_admin_session', JSON.stringify(user ? { uid: user.uid } : null));
        render();
    }
    function getSession() {
        let raw = localStorage.getItem('club_admin_session');
        if (!raw) return null;
        let sess = JSON.parse(raw);
        if (!sess) return null;
        let admin = JSON.parse(localStorage.getItem('club_admin'));
        if (sess.uid === 'admin') return { uid: 'admin', role: 'admin' };
        return null;
    }
    function changeUserBalance(uid, amount) {
        let users = getUsers();
        let u = users.find(x => x.uid === uid);
        if (u) u.balance += amount;
        setUsers(users);
        render();
    }
    function changeGamerBalance(gid, amount) {
        let gamers = getGamers();
        let g = gamers.find(x => x.gid === gid);
        if (g) g.balance += amount;
        setGamers(gamers);
        render();
    }
    function render() {
        let container = document.getElementById('app');
        if (!container) return;
        let sess = getSession();
        if (!sess) {
            container.innerHTML = `
                <div class="card">
                    <h2>👑 管理后台登录</h2>
                    <input type="text" id="adminUser" placeholder="账号">
                    <input type="password" id="adminPwd" placeholder="密码">
                    <button id="loginBtn">登录</button>
                    <div style="margin-top:12px;">演示账号: admin / admin123</div>
                </div>
            `;
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                let user = document.getElementById('adminUser').value;
                let pwd = document.getElementById('adminPwd').value;
                let admin = JSON.parse(localStorage.getItem('club_admin'));
                if (user === admin.loginId && pwd === admin.pwd) {
                    saveAdmin({ uid: 'admin' });
                } else alert("账号或密码错误");
            });
            return;
        }

        let users = getUsers();
        let gamers = getGamers();
        let orders = getOrders();
        let equipments = getEquipment();
        let rechargeReqs = getRechargeReqs();
        let withdrawReqs = getWithdrawReqs();
        let complaints = getComplaints();
        let announcements = getAnnouncements();
        let html = `
            <div class="card">
                <h2>👑 管理后台</h2>
                <button id="logoutBtn" class="gray-btn">退出</button>
            </div>
            <div class="card"><h3>📊 统计</h3><div>玩家：${users.length} | 打手：${gamers.length} | 点单：${orders.length} | 装备：${equipments.length} | 投诉：${complaints.length}</div></div>
            <div class="card"><h3>📢 发送公告</h3>
                <div style="margin-bottom:12px;"><strong>用户版公告：</strong><br><textarea id="userAnnouncement" rows="2" placeholder="发送给所有玩家的公告">${announcements.user}</textarea><button id="sendUserAnnouncement">发送用户公告</button></div>
                <div><strong>打手版公告：</strong><br><textarea id="gamerAnnouncement" rows="2" placeholder="发送给所有打手的公告">${announcements.gamer}</textarea><button id="sendGamerAnnouncement">发送打手公告</button></div>
            </div>
            <div class="card"><h3>➕ 创建玩家账号</h3>
                <input type="text" id="newUserName" placeholder="玩家昵称">
                <input type="text" id="newUserLogin" placeholder="登录账号">
                <input type="password" id="newUserPwd" placeholder="密码">
                <button id="createUserBtn">创建玩家</button>
            </div>
            <div class="card"><h3>➕ 创建打手账号</h3>
                <input type="text" id="newGamerName" placeholder="打手昵称">
                <input type="text" id="newGamerLogin" placeholder="登录账号">
                <input type="password" id="newGamerPwd" placeholder="密码">
                <button id="createGamerBtn">创建打手</button>
            </div>
            <div class="card"><h3>👥 玩家管理</h3><div id="userList"></div></div>
            <div class="card"><h3>🔫 打手管理</h3><div id="gamerListAdmin"></div></div>
            <div class="card"><h3>💰 充值审核</h3><div id="rechargeReqs"></div></div>
            <div class="card"><h3>💸 提现审核</h3><div id="withdrawReqs"></div></div>
            <div class="card"><h3>📦 装备管理</h3><div id="equipManage"></div></div>
            <div class="card"><h3>📋 点单管理</h3><div id="orderListAdmin"></div></div>
            <div class="card"><h3>⚠️ 投诉管理（退款+封禁打手）</h3><div id="complaintListAdmin"></div></div>
        `;
        container.innerHTML = html;
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('club_admin_session'); render(); });

        // 发送公告
        document.getElementById('sendUserAnnouncement')?.addEventListener('click', () => {
            let content = document.getElementById('userAnnouncement').value;
            let ann = getAnnouncements();
            ann.user = content;
            setAnnouncements(ann);
            alert("用户公告已发送");
        });
        document.getElementById('sendGamerAnnouncement')?.addEventListener('click', () => {
            let content = document.getElementById('gamerAnnouncement').value;
            let ann = getAnnouncements();
            ann.gamer = content;
            setAnnouncements(ann);
            alert("打手公告已发送");
        });

        // 创建玩家
        document.getElementById('createUserBtn')?.addEventListener('click', () => {
            let name = document.getElementById('newUserName').value;
            let login = document.getElementById('newUserLogin').value;
            let pwd = document.getElementById('newUserPwd').value;
            if (!name || !login || !pwd) { alert("请完整填写昵称、账号、密码"); return; }
            let users = getUsers();
            if (users.find(u => u.loginId === login)) { alert("玩家账号已存在"); return; }
            let newUser = { uid: 'u' + Date.now(), username: name, loginId: login, pwd: pwd, phone: '', role: 'user', balance: 0, banned: false, regTime: Date.now() };
            users.push(newUser);
            setUsers(users);
            alert(`玩家 ${name} 创建成功，账号 ${login}`);
            render();
        });

        document.getElementById('createGamerBtn')?.addEventListener('click', () => {
            let name = document.getElementById('newGamerName').value;
            let login = document.getElementById('newGamerLogin').value;
            let pwd = document.getElementById('newGamerPwd').value;
            if (!name || !login || !pwd) { alert("请完整填写昵称、账号、密码"); return; }
            let gamers = getGamers();
            if (gamers.find(g => g.loginId === login)) { alert("打手账号已存在"); return; }
            let newGamer = { gid: 'g' + Date.now(), username: name, loginId: login, pwd: pwd, phone: '', skills: [], balance: 0, banned: false, avgRating: 0, totalOrders: 0, regTime: Date.now(), approved: true };
            gamers.push(newGamer);
            setGamers(gamers);
            alert(`打手 ${name} 创建成功，账号 ${login}`);
            render();
        });

        let userDiv = document.getElementById('userList');
        userDiv.innerHTML = users.map(u => `<div>${u.username} 余额${u.balance} ${u.banned?'[封禁]':''} <button class="banUser" data-uid="${u.uid}">封禁/解封</button> <button class="addBalance" data-uid="${u.uid}">加余额</button></div>`).join('');
        document.querySelectorAll('.banUser').forEach(btn => {
            btn.addEventListener('click', () => {
                let uid = btn.dataset.uid;
                let arr = getUsers();
                let u = arr.find(x => x.uid === uid);
                if (u) u.banned = !u.banned;
                setUsers(arr);
                render();
            });
        });
        document.querySelectorAll('.addBalance').forEach(btn => {
            btn.addEventListener('click', () => {
                let uid = btn.dataset.uid;
                let amt = prompt("增加余额");
                if (amt) {
                    let arr = getUsers();
                    let u = arr.find(x => x.uid === uid);
                    if (u) u.balance += parseInt(amt);
                    setUsers(arr);
                    render();
                }
            });
        });

        let gamerDiv = document.getElementById('gamerListAdmin');
        gamerDiv.innerHTML = gamers.map(g => `<div>${g.username} 余额${g.balance} ${g.banned?'[封禁]':''} <button class="banGamer" data-gid="${g.gid}">封禁/解封</button> <button class="delGamer" data-gid="${g.gid}">删除</button></div>`).join('');
        document.querySelectorAll('.banGamer').forEach(btn => {
            btn.addEventListener('click', () => {
                let gid = btn.dataset.gid;
                let arr = getGamers();
                let g = arr.find(x => x.gid === gid);
                if (g) g.banned = !g.banned;
                setGamers(arr);
                render();
            });
        });
        document.querySelectorAll('.delGamer').forEach(btn => {
            btn.addEventListener('click', () => {
                let gid = btn.dataset.gid;
                let arr = getGamers().filter(x => x.gid !== gid);
                setGamers(arr);
                render();
            });
        });

        let rechargeDiv = document.getElementById('rechargeReqs');
        rechargeDiv.innerHTML = rechargeReqs.map(r => `<div>用户${r.userId} 金额${r.amount} <button class="confirmRecharge" data-id="${r.id}">确认到账</button> <button class="rejectRecharge" data-id="${r.id}">驳回</button></div>`).join('');
        document.querySelectorAll('.confirmRecharge').forEach(btn => {
            btn.addEventListener('click', () => {
                let rid = parseInt(btn.dataset.id);
                let reqs = getRechargeReqs();
                let req = reqs.find(x => x.id === rid);
                if (req) {
                    if (req.type === 'user') changeUserBalance(req.userId, req.amount);
                    else changeGamerBalance(req.userId, req.amount);
                    setRechargeReqs(reqs.filter(x => x.id !== rid));
                    render();
                }
            });
        });
        document.querySelectorAll('.rejectRecharge').forEach(btn => {
            btn.addEventListener('click', () => {
                let rid = parseInt(btn.dataset.id);
                setRechargeReqs(getRechargeReqs().filter(x => x.id !== rid));
                render();
            });
        });

        let withdrawDiv = document.getElementById('withdrawReqs');
        withdrawDiv.innerHTML = withdrawReqs.map(w => `<div>用户${w.userId} 金额${w.amount} 账号${w.account} <button class="confirmWithdraw" data-id="${w.id}">确认打款</button> <button class="rejectWithdraw" data-id="${w.id}">驳回</button></div>`).join('');
        document.querySelectorAll('.confirmWithdraw').forEach(btn => {
            btn.addEventListener('click', () => {
                let wid = parseInt(btn.dataset.id);
                setWithdrawReqs(getWithdrawReqs().filter(x => x.id !== wid));
                alert("打款完成（演示）");
                render();
            });
        });
        document.querySelectorAll('.rejectWithdraw').forEach(btn => {
            btn.addEventListener('click', () => {
                let wid = parseInt(btn.dataset.id);
                setWithdrawReqs(getWithdrawReqs().filter(x => x.id !== wid));
                render();
            });
        });

        let equipManageDiv = document.getElementById('equipManage');
        equipManageDiv.innerHTML = equipments.map(e => `<div>${e.title} 卖家${e.sellerName} 价格${e.price} <button class="offShelfEquip" data-eid="${e.eid}">强制下架</button></div>`).join('');
        document.querySelectorAll('.offShelfEquip').forEach(btn => {
            btn.addEventListener('click', () => {
                let eid = btn.dataset.eid;
                setEquipment(getEquipment().filter(eq => eq.eid !== eid));
                render();
            });
        });

        let orderDiv = document.getElementById('orderListAdmin');
        orderDiv.innerHTML = orders.map(o => `<div>${o.userName} -> ${o.gamerName || '未接'} 金额${o.price} 状态${o.status} <button class="cancelOrderAdmin" data-oid="${o.oid}">强制取消</button></div>`).join('');
        document.querySelectorAll('.cancelOrderAdmin').forEach(btn => {
            btn.addEventListener('click', () => {
                let oid = btn.dataset.oid;
                setOrders(getOrders().filter(x => x.oid !== oid));
                render();
            });
        });

        // 投诉管理
        let complaintDiv = document.getElementById('complaintListAdmin');
        if (complaintDiv) {
            if (complaints.length === 0) complaintDiv.innerHTML = "<div>暂无投诉</div>";
            else {
                complaintDiv.innerHTML = complaints.map(c => `
                    <div class="order-item" style="background:#fff5e6;">
                        <div><b>订单号：${c.oid.slice(-6)}</b> | 玩家：${c.userName} | 打手：${c.gamerName}</div>
                        <div>投诉原因：${c.reason}</div>
                        <div>状态：${c.status === 'pending' ? '待处理' : '已处理'}</div>
                        ${c.status === 'pending' ? `<button class="refundAndBan" data-id="${c.id}" data-oid="${c.oid}" data-gamer="${c.gamerId}" data-user="${c.userId}" data-amount="${getOrders().find(o=>o.oid===c.oid)?.price || 0}">✅ 退款并封禁打手</button>` : ''}
                    </div>
                `).join('');
                document.querySelectorAll('.refundAndBan').forEach(btn => {
                    btn.addEventListener('click', () => {
                        let cid = parseInt(btn.dataset.id);
                        let oid = btn.dataset.oid;
                        let gamerId = btn.dataset.gamer;
                        let userId = btn.dataset.user;
                        let amount = parseInt(btn.dataset.amount);
                        changeUserBalance(userId, amount);
                        let gamers = getGamers();
                        let gamer = gamers.find(g => g.gid === gamerId);
                        if (gamer) gamer.banned = true;
                        setGamers(gamers);
                        let complaintsArr = getComplaints();
                        let complaint = complaintsArr.find(c => c.id === cid);
                        if (complaint) complaint.status = 'refunded';
                        setComplaints(complaintsArr);
                        alert("已退款给玩家并封禁打手账号");
                        render();
                    });
                });
            }
        }
    }
    render();
})();
</script>
</body>
</html>
