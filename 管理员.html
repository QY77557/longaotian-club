<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>龙傲天俱乐部 · 管理后台</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #f1f5f9; margin: 0; padding: 15px; font-family: system-ui, sans-serif; color: #0f172a; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
        h2, h3 { margin: 0 0 16px 0; border-left: 4px solid #f59e0b; padding-left: 12px; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 6px 0; border-radius: 40px; border: 1px solid #cbd5e1; background: white; font-size: 14px; }
        button { background: #f59e0b; color: white; font-weight: bold; border: none; cursor: pointer; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .price-item { background: #f8fafc; border-radius: 16px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ---------- 初始化数据 ----------
if (!localStorage.getItem('club_users')) {
    localStorage.setItem('club_users', JSON.stringify([
        { uid: 'u1', username: '测试玩家', loginId: 'player', pwd: '111', balance: 500, level: 'user', banned: false, coupons: [] }
    ]));
}
if (!localStorage.getItem('club_gamers')) {
    localStorage.setItem('club_gamers', JSON.stringify([
        { gid: 'g1', username: '墨渊', loginId: 'moyuan', pwd: '123456', skills: [], balance: 0, level: 'junior_gamer', banned: false, approved: true, verifyStatus: 'verified', totalOrders: 0 }
    ]));
}
if (!localStorage.getItem('club_orders')) localStorage.setItem('club_orders', JSON.stringify([]));
if (!localStorage.getItem('club_equipment')) localStorage.setItem('club_equipment', JSON.stringify([]));
if (!localStorage.getItem('club_admin')) localStorage.setItem('club_admin', JSON.stringify({ loginId: 'admin', pwd: 'admin123' }));
if (!localStorage.getItem('club_recharge_reqs')) localStorage.setItem('club_recharge_reqs', JSON.stringify([]));
if (!localStorage.getItem('club_withdraw_reqs')) localStorage.setItem('club_withdraw_reqs', JSON.stringify([]));
if (!localStorage.getItem('club_complaints')) localStorage.setItem('club_complaints', JSON.stringify([]));
if (!localStorage.getItem('club_announcements')) localStorage.setItem('club_announcements', JSON.stringify({ user: '', gamer: '', ad: { type: 'text', content: '欢迎光临', link: '' } }));
if (!localStorage.getItem('club_settings')) localStorage.setItem('club_settings', JSON.stringify({ platformFee: 10, minWithdrawUser: 20, minWithdrawGamer: 25 }));
if (!localStorage.getItem('club_blacklist_ip')) localStorage.setItem('club_blacklist_ip', JSON.stringify([]));
if (!localStorage.getItem('club_logs')) localStorage.setItem('club_logs', JSON.stringify([]));
if (!localStorage.getItem('club_finance_logs')) localStorage.setItem('club_finance_logs', JSON.stringify([]));
if (!localStorage.getItem('club_festival_log')) localStorage.setItem('club_festival_log', JSON.stringify({}));
// 初始化市场价格库（便宜版 + 无敌战神100）
if (!localStorage.getItem('club_market_prices')) {
    localStorage.setItem('club_market_prices', JSON.stringify({
        base: { '和平精英': 20, '地铁逃生': 25, '百万撤离': 30, '千万撤离': 40, 'PUBG': 20, '三角洲行动': 25 },
        keywords: { '无敌战神': 100, '战神': 60, '王牌': 20, '皇冠': 15, '星钻': 10, '热成像': 20, '六套': 25, '七套': 35, '八套': 45, '九套': 55, '十套': 70, '百万撤离': 30, '千万撤离': 40, '地铁': 15 }
    }));
}

function getMarketPrices() { return JSON.parse(localStorage.getItem('club_market_prices') || '{}'); }
function setMarketPrices(v) { localStorage.setItem('club_market_prices', JSON.stringify(v)); }
function getUsers() { return JSON.parse(localStorage.getItem('club_users') || '[]'); }
function setUsers(v) { localStorage.setItem('club_users', JSON.stringify(v)); }
function getGamers() { return JSON.parse(localStorage.getItem('club_gamers') || '[]'); }
function setGamers(v) { localStorage.setItem('club_gamers', JSON.stringify(v)); }
function getOrders() { return JSON.parse(localStorage.getItem('club_orders') || '[]'); }
function setOrders(v) { localStorage.setItem('club_orders', JSON.stringify(v)); }
function getEquipment() { return JSON.parse(localStorage.getItem('club_equipment') || '[]'); }
function setEquipment(v) { localStorage.setItem('club_equipment', JSON.stringify(v)); }
function getRechargeReqs() { return JSON.parse(localStorage.getItem('club_recharge_reqs') || '[]'); }
function setRechargeReqs(v) { localStorage.setItem('club_recharge_reqs', JSON.stringify(v)); }
function getWithdrawReqs() { return JSON.parse(localStorage.getItem('club_withdraw_reqs') || '[]'); }
function setWithdrawReqs(v) { localStorage.setItem('club_withdraw_reqs', JSON.stringify(v)); }
function getComplaints() { return JSON.parse(localStorage.getItem('club_complaints') || '[]'); }
function setComplaints(v) { localStorage.setItem('club_complaints', JSON.stringify(v)); }
function getAnnouncements() { return JSON.parse(localStorage.getItem('club_announcements') || '{}'); }
function setAnnouncements(v) { localStorage.setItem('club_announcements', JSON.stringify(v)); }
function getSettings() { return JSON.parse(localStorage.getItem('club_settings') || '{}'); }
function setSettings(v) { localStorage.setItem('club_settings', JSON.stringify(v)); }
function getBlacklistIp() { return JSON.parse(localStorage.getItem('club_blacklist_ip') || '[]'); }
function setBlacklistIp(v) { localStorage.setItem('club_blacklist_ip', JSON.stringify(v)); }

let currentAdmin = null;
function saveAdmin(user) { currentAdmin = user; localStorage.setItem('club_admin_session', JSON.stringify(user ? { uid: user.uid } : null)); render(); }
function getSession() { let raw = localStorage.getItem('club_admin_session'); if (!raw) return null; let sess = JSON.parse(raw); if (!sess) return null; let admin = JSON.parse(localStorage.getItem('club_admin')); if (sess.uid === 'admin') return { uid: 'admin', role: 'admin' }; return null; }
function changeUserBalance(uid, amount, remark) { let users = getUsers(); let u = users.find(x => x.uid === uid); if (u) { u.balance += amount; setUsers(users); } render(); }
function changeGamerBalance(gid, amount, remark) { let gamers = getGamers(); let g = gamers.find(x => x.gid === gid); if (g) { g.balance += amount; setGamers(gamers); } render(); }

function render() {
    let container = document.getElementById('app');
    if (!container) return;
    let sess = getSession();
    if (!sess) {
        container.innerHTML = `<div class="card" style="max-width:400px;margin:auto;"><h2>👑 管理后台登录</h2><input id="adminUser" placeholder="账号" value="admin"><input id="adminPwd" type="password" placeholder="密码" value="admin123"><button id="loginBtn">登录</button></div>`;
        document.getElementById('loginBtn')?.addEventListener('click', () => { let user = document.getElementById('adminUser').value, pwd = document.getElementById('adminPwd').value; let admin = JSON.parse(localStorage.getItem('club_admin')); if (user === admin.loginId && pwd === admin.pwd) { saveAdmin({ uid: 'admin' }); } else alert("账号或密码错误"); });
        return;
    }
    
    let users = getUsers();
    let gamers = getGamers();
    let orders = getOrders();
    let equipments = getEquipment();
    let rechargeReqs = getRechargeReqs();
    let withdrawReqs = getWithdrawReqs();
    let complaints = getComplaints();
    let announcements = getAnnouncements();
    let settings = getSettings();
    let blacklistIp = getBlacklistIp();
    let marketPrices = getMarketPrices();
    let totalBalance = users.reduce((s,u)=>s+u.balance,0) + gamers.reduce((s,g)=>s+g.balance,0);
    
    let html = `
        <div class="grid">
            <div class="card"><h2>📊 数据看板</h2><div>👥 玩家：${users.length} | 🔫 打手：${gamers.length}</div><div>📦 订单：${orders.length} | 💰 总余额：${totalBalance}元</div></div>
            <div class="card"><h3>⚙️ 系统设置</h3><label>平台抽成(%)</label><input id="fee" value="${settings.platformFee||10}" type="number"><label>玩家最低提现(元)</label><input id="minUser" value="${settings.minWithdrawUser||20}" type="number"><label>打手最低提现(元)</label><input id="minGamer" value="${settings.minWithdrawGamer||25}" type="number"><button id="saveSettings">保存设置</button></div>
            <div class="card"><h3>📢 公告/广告</h3><textarea id="userAnnounce" rows="2" placeholder="用户公告">${announcements.user||''}</textarea><button id="sendUserAnnounce">发送用户公告</button><textarea id="gamerAnnounce" rows="2" placeholder="打手公告">${announcements.gamer||''}</textarea><button id="sendGamerAnnounce">发送打手公告</button></div>
            <div class="card"><h3>🏷️ 市场价格配置</h3><div><strong>游戏底价</strong><div id="basePriceList"></div><div class="flex"><input id="newGameName" placeholder="游戏名"><input id="newGamePrice" placeholder="底价(元)"><button id="addGamePrice">添加游戏底价</button></div></div><hr><div><strong>关键词溢价</strong><div id="keywordPriceList"></div><div class="flex"><input id="newKeyword" placeholder="关键词"><input id="newKeywordPrice" placeholder="溢价(元)"><button id="addKeywordPrice">添加关键词溢价</button></div></div></div>
            <div class="card"><h3>🎁 优惠券管理</h3><div class="flex"><select id="couponUser"><option value="">-- 选择用户 --</option>${users.map(u => `<option value="${u.uid}">${u.username}</option>`).join('')}</select><input id="couponName" placeholder="优惠券名称" value="福利券"><input id="couponValue" placeholder="面值(元)" value="20" type="number"><input id="couponMinAmount" placeholder="满减门槛(元)" value="50" type="number"></div><button id="sendCouponBtn">发放优惠券</button></div>
            <div class="card"><h3>➕ 创建账号</h3><div class="flex"><input id="newUserName" placeholder="昵称"><input id="newUserLogin" placeholder="账号"><input id="newUserPwd" placeholder="密码"></div><button id="createUser">创建玩家</button><div class="flex"><input id="newGamerName" placeholder="昵称"><input id="newGamerLogin" placeholder="账号"><input id="newGamerPwd" placeholder="密码"></div><button id="createGamer">创建打手</button></div>
            <div class="card"><h3>👥 玩家管理</h3><div id="userList" style="max-height:300px;overflow-y:auto;"></div></div>
            <div class="card"><h3>🔫 打手管理</h3><div id="gamerList" style="max-height:300px;overflow-y:auto;"></div></div>
            <div class="card"><h3>💰 充值审核</h3><div id="rechargeList"></div></div>
            <div class="card"><h3>💸 提现审核</h3><div id="withdrawList"></div></div>
            <div class="card"><h3>⚠️ 投诉处理</h3><div id="complaintList"></div></div>
        </div>
    `;
    container.innerHTML = html;
    
    // 渲染价格配置
    let baseDiv = document.getElementById('basePriceList');
    baseDiv.innerHTML = Object.entries(marketPrices.base || {}).map(([k,v]) => `<div class="price-item">${k}: ${v}元 <button class="delBase" data-key="${k}">删除</button></div>`).join('');
    let keywordDiv = document.getElementById('keywordPriceList');
    keywordDiv.innerHTML = Object.entries(marketPrices.keywords || {}).map(([k,v]) => `<div class="price-item">${k}: +${v}元 <button class="delKeyword" data-key="${k}">删除</button></div>`).join('');
    
    document.getElementById('addGamePrice')?.addEventListener('click', () => {
        let name = document.getElementById('newGameName').value;
        let price = parseInt(document.getElementById('newGamePrice').value);
        if(name && price) { let mp = getMarketPrices(); mp.base[name] = price; setMarketPrices(mp); render(); }
    });
    document.getElementById('addKeywordPrice')?.addEventListener('click', () => {
        let kw = document.getElementById('newKeyword').value;
        let price = parseInt(document.getElementById('newKeywordPrice').value);
        if(kw && price) { let mp = getMarketPrices(); mp.keywords[kw] = price; setMarketPrices(mp); render(); }
    });
    document.querySelectorAll('.delBase').forEach(btn => { btn.addEventListener('click', () => { let mp = getMarketPrices(); delete mp.base[btn.dataset.key]; setMarketPrices(mp); render(); }); });
    document.querySelectorAll('.delKeyword').forEach(btn => { btn.addEventListener('click', () => { let mp = getMarketPrices(); delete mp.keywords[btn.dataset.key]; setMarketPrices(mp); render(); }); });
    
    // 保存设置
    document.getElementById('saveSettings')?.addEventListener('click', () => { setSettings({ platformFee: parseInt(document.getElementById('fee').value), minWithdrawUser: parseInt(document.getElementById('minUser').value), minWithdrawGamer: parseInt(document.getElementById('minGamer').value) }); alert("设置已保存"); });
    document.getElementById('sendUserAnnounce')?.addEventListener('click', () => { let ann = getAnnouncements(); ann.user = document.getElementById('userAnnounce').value; setAnnouncements(ann); alert("已发送"); });
    document.getElementById('sendGamerAnnounce')?.addEventListener('click', () => { let ann = getAnnouncements(); ann.gamer = document.getElementById('gamerAnnounce').value; setAnnouncements(ann); alert("已发送"); });
    
    // 发放优惠券
    document.getElementById('sendCouponBtn')?.addEventListener('click', () => {
        let uid = document.getElementById('couponUser').value, name = document.getElementById('couponName').value, value = parseInt(document.getElementById('couponValue').value), minAmount = parseInt(document.getElementById('couponMinAmount').value);
        if (!uid || !name) return alert("填完整");
        let usersArr = getUsers();
        let user = usersArr.find(u => u.uid === uid);
        if (user) { if (!user.coupons) user.coupons = []; user.coupons.push({ id: Date.now(), name, value, minAmount, expireTime: Date.now() + 30*86400000, used: false }); setUsers(usersArr); alert("发放成功"); render(); }
    });
    
    // 玩家管理
    let userDiv = document.getElementById('userList');
    userDiv.innerHTML = users.map(u => `<div class="flex" style="justify-content:space-between;"><span>${u.username} | 余额${u.balance}</span><div><button class="banUser" data-uid="${u.uid}">${u.banned?'解封':'封禁'}</button><button class="addBalance" data-uid="${u.uid}">加余额</button></div></div>`).join('');
    document.querySelectorAll('.banUser').forEach(btn => { btn.addEventListener('click', () => { let u = getUsers().find(x=>x.uid===btn.dataset.uid); if(u) u.banned = !u.banned; setUsers(getUsers()); render(); }); });
    document.querySelectorAll('.addBalance').forEach(btn => { btn.addEventListener('click', () => { let amt = prompt("增加余额"); if(amt) changeUserBalance(btn.dataset.uid, parseInt(amt), '手动加余额'); render(); }); });
    
    // 打手管理
    let gamerDiv = document.getElementById('gamerList');
    gamerDiv.innerHTML = gamers.map(g => `<div class="flex" style="justify-content:space-between;"><span>${g.username} | 余额${g.balance} | 实名:${g.verifyStatus||'未认证'}</span><div><button class="approveVerify" data-gid="${g.gid}">通过</button><button class="banGamer" data-gid="${g.gid}">${g.banned?'解封':'封禁'}</button><button class="addGamerBalance" data-gid="${g.gid}">加余额</button></div></div>`).join('');
    document.querySelectorAll('.approveVerify').forEach(btn => { let g = getGamers().find(x=>x.gid===btn.dataset.gid); if(g) g.verifyStatus='verified'; setGamers(getGamers()); render(); });
    document.querySelectorAll('.banGamer').forEach(btn => { let g = getGamers().find(x=>x.gid===btn.dataset.gid); if(g) g.banned = !g.banned; setGamers(getGamers()); render(); });
    document.querySelectorAll('.addGamerBalance').forEach(btn => { let amt = prompt("增加余额"); if(amt) changeGamerBalance(btn.dataset.gid, parseInt(amt), '手动加余额'); render(); });
    
    // 充值提现投诉逻辑
    let rechargeDiv = document.getElementById('rechargeList');
    rechargeDiv.innerHTML = rechargeReqs.map(r => `<div class="order-item">用户${r.userId} 金额${r.amount}<button class="confirmRecharge" data-id="${r.id}">确认</button><button class="rejectRecharge" data-id="${r.id}">驳回</button></div>`).join('');
    document.querySelectorAll('.confirmRecharge').forEach(btn => { btn.addEventListener('click', () => { let req = getRechargeReqs().find(x=>x.id==parseInt(btn.dataset.id)); if(req) { changeUserBalance(req.userId, req.amount, '充值'); setRechargeReqs(getRechargeReqs().filter(x=>x.id!==req.id)); render(); } }); });
    document.querySelectorAll('.rejectRecharge').forEach(btn => { btn.addEventListener('click', () => { let id = parseInt(btn.dataset.id); setRechargeReqs(getRechargeReqs().filter(x=>x.id!==id)); render(); }); });
    let withdrawDiv = document.getElementById('withdrawList');
    withdrawDiv.innerHTML = withdrawReqs.map(w => `<div class="order-item">用户${w.userId} 金额${w.amount}<button class="confirmWithdraw" data-id="${w.id}">确认打款</button><button class="rejectWithdraw" data-id="${w.id}">驳回</button></div>`).join('');
    document.querySelectorAll('.confirmWithdraw').forEach(btn => { let id = parseInt(btn.dataset.id); setWithdrawReqs(getWithdrawReqs().filter(x=>x.id!==id)); alert("已确认打款"); render(); });
    document.querySelectorAll('.rejectWithdraw').forEach(btn => { let id = parseInt(btn.dataset.id); setWithdrawReqs(getWithdrawReqs().filter(x=>x.id!==id)); render(); });
    let complaintDiv = document.getElementById('complaintList');
    complaintDiv.innerHTML = complaints.map(c => `<div class="order-item">订单${c.oid} 玩家${c.userName} 投诉${c.gamerName}<br>原因：${c.reason}<button class="resolveComplaint" data-id="${c.id}">标记处理</button></div>`).join('');
    document.querySelectorAll('.resolveComplaint').forEach(btn => { let id = parseInt(btn.dataset.id); setComplaints(getComplaints().filter(x=>x.id!==id)); render(); });
}
render();
</script>
</body>
</html>
